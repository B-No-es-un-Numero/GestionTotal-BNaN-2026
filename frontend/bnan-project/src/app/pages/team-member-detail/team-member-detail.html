<app-navbar></app-navbar>

<div class="card p-5 shadow-sm rounded-4">

    <div class="mt-5 mb-4 d-inline-block">
        <button [routerLink]="['/about']"
            class="btn btn-purple-soft text-white d-inline-flex align-items-center w-auto gap-2 mb-4 mt-5">
            <i class="bi bi-arrow-left me-2"></i>
            Volver al equipo
        </button>
    </div>
    <div class="team-member-card">
        <section class="text-center">
            <div class="member-header mb-5">

                <h1 class="fw-bold mb-2">
                    {{ member.name }}
                </h1>

                <p class="fs-5 mb-0">
                    {{ member.role }}
                </p>

            </div>
            <div class="mt-5">

                <h3 class="fw-bold text-purple text-start mb-3">
                    Biografía
                </h3>

                <p class="text-secondary text-start">
                    {{ member.bio }}
                </p>

            </div>
        </section>

        <div class="mt-5">

            <h3 class="fw-bold mb-3 small">
                Especialidades
            </h3>

            <div class="d-flex flex-wrap gap-2">

                @for (specialty of member.specialties; track specialty) {

                <span class="badge rounded-pill badge-purple px-3 py-1 small">
                    {{ specialty }}
                </span>

                }

            </div>

        </div>

        <div class="mt-3">

            <h3 class="fw-bold mb-3 small">
                Herramientas
            </h3>

            <div class="d-flex flex-wrap gap-1">

                @for (tool of member.tools; track tool) {

                <span class="badge rounded-pill badge-dark-custom px-3 py-1 small">
                    {{ tool }}
                </span>

                }

            </div>

        </div>

        <div class="mt-5 text-start">

            <h3 class="fw-bold mb-3 fs-5">
                Contacto
            </h3>

            <div class="d-flex flex-column align-items-start gap-3">

                <a [href]="'mailto:' + member.email" class="contact-link">
                    <i class="bi bi-envelope-fill"></i>
                    {{ member.email }}
                </a>

                <a [href]="member.linkedin" target="_blank" class="contact-link">
                    <i class="bi bi-linkedin"></i>
                    LinkedIn
                </a>

                <a [href]="member.github" target="_blank" class="contact-link">
                    <i class="bi bi-github"></i>
                    GitHub
                </a>

            </div>

        </div>
    </div>

</div>


<app-footer></app-footer>
