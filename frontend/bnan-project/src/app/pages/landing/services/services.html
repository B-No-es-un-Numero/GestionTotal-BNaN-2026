<section id="servicios" class="py-5 bg-white">
  <div class="container py-md-5">
    <div class="text-center mb-5">
      <h2 class="display-5 fw-bold text-dark mb-3">Nuestros Servicios</h2>
      <p class="lead text-secondary mx-auto" style="max-width: 700px;">
        Soluciones integrales de marketing digital adaptadas a las necesidades de tu negocio
      </p>
    </div>

    <div class="row g-4">
      @for (service of services; track service.title) {
        <div class="col-md-6 col-lg-4">
          <div class="service-card p-4 h-100 border-0 rounded-4 transition-all">
            <div class="icon-box d-flex align-items-center justify-content-center rounded-3 mb-4">
              <i [class]="'bi ' + service.icon + ' fs-3 text-purple'"></i>
            </div>
            
            <h3 class="h4 fw-bold text-dark mb-3">{{ service.title }}</h3>
            <p class="text-secondary mb-0 leading-relaxed">
              {{ service.description }}
            </p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
