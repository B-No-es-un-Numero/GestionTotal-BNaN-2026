<section id="inicio" class="hero-section position-relative overflow-hidden bg-gradient py-5">
  
  <div class="decorative-shape shape-1 opacity-10">
    <svg width="200" height="200" viewBox="0 0 200 200" fill="none">
      <circle cx="100" cy="100" r="80" stroke="#d1d5db" stroke-width="2" />
      <circle cx="100" cy="100" r="60" stroke="#d1d5db" stroke-width="2" />
      <circle cx="100" cy="100" r="40" stroke="#d1d5db" stroke-width="2" />
    </svg>
  </div>

  <div class="decorative-shape shape-2 opacity-10">
    <svg width="150" height="150" viewBox="0 0 150 150" fill="none">
      <path d="M75 15 L135 135 L15 135 Z" stroke="#d1d5db" stroke-width="2" />
      <path d="M75 45 L105 105 L45 105 Z" stroke="#d1d5db" stroke-width="2" />
    </svg>
  </div>

  <div class="container position-relative mt-5">
    <div class="text-center mx-auto max-width-lg">
      
      <div class="d-flex justify-content-center gap-3 mb-4">
            <div class="icon-badge bounce-0">
                <i class="bi bi-stars text-purple"></i>
            </div>
            <div class="icon-badge bounce-1">
                <i class="bi bi-graph-up-arrow text-purple"></i>
            </div>
            <div class="icon-badge bounce-2">
                <i class="bi bi-lightning-charge text-purple"></i>
            </div>
        </div>

      <h1 class="display-3 fw-bold mb-4 text-dark">
        Impulsa tu Marca al <span class="text-purple">Siguiente Nivel</span>
      </h1>
      
      <p class="lead text-secondary mb-5 mx-auto px-md-5">
        Estrategias de marketing digital que transforman negocios y generan resultados medibles
      </p>

      <div class="d-grid d-sm-flex justify-content-sm-center gap-3">
        <button (click)="scrollTo('contacto')" class="btn btn-purple btn-lg px-5 py-3">
          Comenzar Ahora <span>&rarr;</span>
        </button>
        <button (click)="scrollTo('servicios')" class="btn btn-outline-purple btn-lg px-5 py-3">
          Ver Servicios
        </button>
      </div>
    </div>

    <!-- Estadísticas -->
    <div class="row g-4 mt-5 pt-5 text-center mx-auto max-width-md">
      <div class="col-6 col-md-3">
        <h2 class="h1 fw-bold text-purple mb-0">500+</h2>
        <small class="text-muted text-uppercase fw-semibold">Clientes</small>
      </div>
      <div class="col-6 col-md-3">
        <h2 class="h1 fw-bold text-purple mb-0">98%</h2>
        <small class="text-muted text-uppercase fw-semibold">Satisfacción</small>
      </div>
      <div class="col-6 col-md-3">
        <h2 class="h1 fw-bold text-purple mb-0">15+</h2>
        <small class="text-muted text-uppercase fw-semibold">Años</small>
      </div>
      <div class="col-6 col-md-3">
        <h2 class="h1 fw-bold text-purple mb-0">200%</h2>
        <small class="text-muted text-uppercase fw-semibold">ROI Promedio</small>
      </div>
    </div>
  </div>
</section>
